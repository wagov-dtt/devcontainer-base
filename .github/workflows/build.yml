name: Build and Push DevContainer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'  # Daily at 6 AM Perth (GMT+8)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wagov-dtt/devcontainer-base

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest-16core
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm-16core
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Validate mise configuration
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://mise.run | MISE_INSTALL_PATH=/usr/local/bin/mise sh
        mise trust --yes .
        mise config >/dev/null

    - name: Set build date for cache busting
      id: date
      run: echo "value=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

    - name: Extract metadata (tags) for Docker
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=schedule,pattern=nightly
          type=schedule,pattern=latest
          type=ref,event=branch
          type=ref,event=tag
          type=sha,prefix={{branch}}-,enable={{is_default_branch}}
        flavor: |
          suffix=-${{ matrix.arch }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Log in to Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Build and push image (${{ matrix.arch }})
      uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
      env:
        DATE: ${{ steps.date.outputs.value }}
        TAGS: ${{ steps.meta.outputs.tags }}
        ARCH: ${{ matrix.arch }}
        GITHUB_TOKEN: ${{ github.token }}
      with:
        source: .
        targets: build-test
        files: |
          ./docker-bake.hcl
          ${{ steps.meta.outputs.bake-file-labels }}
          ${{ steps.meta.outputs.bake-file-annotations }}
        push: ${{ github.event_name != 'pull_request' }}
        load: ${{ github.event_name == 'pull_request' }}

    - name: Set image tag for testing
      id: test-tag
      run: |
        TAG=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
        if [ -z "$TAG" ]; then
          TAG="devcontainer-base:test"
        fi
        echo "value=$TAG" >> "$GITHUB_OUTPUT"

    - name: Test devcontainer functionality
      run: |
        # shellcheck disable=SC2016 # expand date/network inside the container, not on the runner
        test_cmd='network="devcontainer-test-$(date +%s)-$$"; trap "docker network rm \"$network\" >/dev/null 2>&1 || true" EXIT; docker network create "$network" >/dev/null && mise doctor && docker run --rm --network "$network" ghcr.io/curl/curl-container/curl-multi:master -s ipinfo.io && https ipinfo.io'
        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          --group-add "$(stat -c '%g' /var/run/docker.sock)" \
          "${{ steps.test-tag.outputs.value }}" \
          -c "$test_cmd"


  create-manifest:
    needs: build-and-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      env:
        DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=schedule,pattern=nightly
          type=schedule,pattern=latest
          type=ref,event=branch
          type=ref,event=tag
          type=sha,prefix={{branch}}-,enable={{is_default_branch}}

    - name: Log in to Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Create and push manifest
      uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        source: .
        targets: release
        files: |
          ./docker-bake.hcl
          ${{ steps.meta.outputs.bake-file-labels }}
          ${{ steps.meta.outputs.bake-file-annotations }}
        push: true
