name: Test DevContainer CI

# This workflow tests devcontainer functionality on PRs only.
# Main branch builds are handled by build.yml which includes full multi-arch builds.

on:
  pull_request:
    branches: [main]
    paths: ['.devcontainer/**', 'justfile', 'build.py', 'Dockerfile', 'docker-bake.hcl', 'pyproject.toml', '.dockerignore', 'src/**']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-devcontainer-ci:
    runs-on: ubuntu-latest-16core
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
          
      - name: Test mise tools
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3.1900000449
        with:
          imageName: ghcr.io/wagov-dtt/devcontainer-base
          push: never
          runCmd: |
            mise doctor && mise list
            
      - name: Test just recipes
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3.1900000449
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          imageName: ghcr.io/wagov-dtt/devcontainer-base
          push: never
          env: |
            GITHUB_TOKEN
          runCmd: just test
