name: Test DevContainer CI

# This workflow tests devcontainer functionality on PRs only.
# Main branch builds are handled by build.yml which includes full multi-arch builds.

on:
  pull_request:
    branches: [main]
    paths: ['.devcontainer/**', 'justfile', 'Dockerfile', 'docker-bake.hcl', '.dockerignore', 'mise.toml', 'mise.apt.toml', 'install.sh', 'scripts/**']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-devcontainer-ci:
    runs-on: ubuntu-latest-16core
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Test mise tools
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          imageName: ghcr.io/wagov-dtt/devcontainer-base
          push: never
          runCmd: |
            mise doctor && mise list

      - name: Test just recipes
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          imageName: ghcr.io/wagov-dtt/devcontainer-base
          push: never
          env: |
            GITHUB_TOKEN
          runCmd: just test
